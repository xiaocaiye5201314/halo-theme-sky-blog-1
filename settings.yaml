    # ========================================
    # 认证页面设置
    # ========================================
    - group: auth
      label: 认证
      formSchema:
        - $formkit: group
          name: auth_settings
          label: 认证页面样式
          value:
            auth_layout: default
            brand_style: simple
            card_effect: 3d
            brand_slogan: "探索、记录、分享"
            features_welcome: "欢迎来到"
            feature_1_title: "安全可靠"
            feature_1_desc: "基于 Spring Security 的账户保护"
            feature_2_title: "内容推荐"
            feature_2_desc: "为您量身定制的阅读体验"
            feature_3_title: "多端同步"
            feature_3_desc: "随时随地访问您的创作"
          children:
            - $formkit: toggle
              id: auth_layout
              name: auth_layout
              label: 页面布局
              help: 选择登录、注册等认证页面的整体布局方式
              render-type: text
              size: 100
              gap: 10
              value: default
              options:
                - label: 系统默认
                  value: default
                - label: 分屏布局
                  value: split
                - label: 居中卡片
                  value: centered
            - $formkit: toggle
              id: brand_style
              name: brand_style
              label: 品牌区样式
              help: 分屏布局左侧的展示风格
              render-type: text
              size: 100
              gap: 10
              value: simple
              if: $get(auth_layout).value === 'split'
              options:
                - label: 简约品牌
                  value: simple
                - label: 功能特性
                  value: features
                - label: 动态插画
                  value: illustration
            - $formkit: toggle
              id: card_effect
              name: card_effect
              label: 卡片效果
              help: 为居中卡片布局选择交互效果
              render-type: text
              size: 100
              gap: 10
              value: 3d
              if: $get(auth_layout).value === 'centered'
              options:
                - label: 3D 倾斜
                  value: 3d
                - label: 聚光灯
                  value: spotlight
            - $formkit: text
              name: auth_site_title_simple
              label: 站点标题
              help: 简约风格下的站点标题，留空则使用站点默认标题
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'simple'
              placeholder: "留空使用站点标题"
            - $formkit: text
              name: brand_slogan
              label: 品牌标语
              help: 在品牌展示区显示的标语文字
              if: $get(auth_layout).value === 'split'
              placeholder: "探索、记录、分享"
              value: "探索、记录、分享"
            - $formkit: attachment
              name: auth_logo
              label: 功能区 Logo
              help: 留空则使用站点默认 Logo
              accepts: ["image/*"]
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_logo_field
            - $formkit: text
              name: auth_site_title
              label: 功能区标题
              help: 留空则使用站点默认标题
              placeholder: "留空使用站点标题"
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_site_title_field
            - $formkit: attachment
              name: auth_side_image
              label: 侧边栏背景图
              help: 自定义侧边栏的背景图片，上传后将覆盖默认的渐变背景
              accepts: ["image/*"]
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_side_image_field
            - $formkit: text
              name: features_welcome
              label: 欢迎语
              placeholder: "欢迎来到"
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: features_welcome_field

            # 特性 1
            - $formkit: iconify
              name: feature_1_icon
              label: 特性 1 图标
              format: svg
              value-only: true
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f1_icon_field
            - $formkit: text
              name: feature_1_title
              label: 特性 1 标题
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f1_title_field
            - $formkit: text
              name: feature_1_desc
              label: 特性 1 描述
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f1_desc_field

            # 特性 2
            - $formkit: iconify
              name: feature_2_icon
              label: 特性 2 图标
              format: svg
              value-only: true
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f2_icon_field
            - $formkit: text
              name: feature_2_title
              label: 特性 2 标题
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f2_title_field
            - $formkit: text
              name: feature_2_desc
              label: 特性 2 描述
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f2_desc_field

            # 特性 3
            - $formkit: iconify
              name: feature_3_icon
              label: 特性 3 图标
              format: svg
              value-only: true
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f3_icon_field
            - $formkit: text
              name: feature_3_title
              label: 特性 3 标题
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f3_title_field
            - $formkit: text
              name: feature_3_desc
              label: 特性 3 描述
              if: $get(auth_layout).value === 'split' && $get(brand_style).value === 'features'
              key: auth_f3_desc_field

    - group: bangumi_settings
      label: 追番
      formSchema:
        - $formkit: group
          name: plugin_tips
          label: 📦 插件配置提示
          help: 需要安装「Bilibili 追番」插件并配置 B 站 UID
          children: []
        - $formkit: text
          name: page_title
          label: 页面标题
          value: "追番列表"
          placeholder: "追番页面的标题"
        - $formkit: textarea
          name: page_description
          label: 页面描述
          value: "记录我的二次元之旅"
          rows: 2
          placeholder: "追番页面的描述"
        - $formkit: group
          name: card_settings
          label: 追番卡片设置
          help: 侧边栏追番卡片的显示配置
          value:
            type_num: 1
            status: 2
            size: 6
          children:
            - $formkit: select
              name: type_num
              label: 番剧类型
              help: 选择要展示的番剧类型
              value: 1
              options:
                - label: 追番
                  value: 1
                - label: 追剧
                  value: 2
            - $formkit: select
              name: status
              label: 番剧状态
              help: 选择要展示的番剧状态
              value: 2
              options:
                - label: 全部
                  value: 0
                - label: 想看
                  value: 1
                - label: 在看
                  value: 2
                - label: 已看
                  value: 3
            - $formkit: number
              name: size
              label: 展示数量
              help: 轮播卡片展示的番剧数量
              value: 6
              min: 1
              max: 12

    - group: equipment_settings
      label: 装备
      formSchema:
        - $formkit: group
          name: plugin_tips
          label: 插件配置提示
          help: 需要安装「Equipment 装备管理」插件
          children: []

        # ===== 基础信息 =====
        - $formkit: group
          name: basic_info
          label: 基础信息
          value:
            page_title: "我的装备"
            page_subtitle: "好物分享"
            page_description: "分享我日常使用的硬件与软件"
          children:
            - $formkit: text
              name: page_title
              label: 页面标题
              value: "我的装备"
              placeholder: "装备页面的标题"
            - $formkit: text
              name: page_subtitle
              label: 副标题
              value: "好物分享"
              placeholder: "页面副标题"
            - $formkit: textarea
              name: page_description
              label: 页面描述
              value: "分享我日常使用的硬件与软件"
              placeholder: "页面描述信息"
              rows: 2

        # ===== 风格设置 =====
        - $formkit: group
          name: style_settings
          label: 风格设置
          value:
            mode: "tech"
            tab_style: "pills"
            hero_background: "https://www.dmoe.cc/random.php"
          children:
            - $formkit: toggle
              id: mode
              name: mode
              label: 装备页风格
              help: 选择装备页面的展示风格
              render-type: text
              size: 80
              gap: 10
              value: tech
              options:
                - label: 3D卡片
                  value: tech
                - label: 优雅卡片
                  value: simple
            - $formkit: toggle
              name: tab_style
              key: tab_style_field
              label: Tab 切换样式
              help: 选择分组切换按钮的展示样式
              if: $get(mode).value === 'tech'
              render-type: text
              size: 80
              gap: 10
              value: pills
              options:
                - label: 药丸胶囊
                  value: pills
                - label: 芯片边框
                  value: chips
                - label: 下划线
                  value: underline
                - label: 玻璃
                  value: glass
            - $formkit: attachment
              name: hero_background
              key: hero_background_field
              label: Hero 背景图
              help: 优雅卡片模式下的顶部大图（建议 16:9 比例）
              if: $get(mode).value === 'simple'
              value: "https://www.dmoe.cc/random.php"
              accepts:
                - "image/*"

        # ===== 功能设置 =====
        - $formkit: group
          name: feature_settings
          label: 功能设置
          value:
            enable_comment: true
          children:
            - $formkit: switch
              name: enable_comment
              label: 启用评论
              help: 在装备页面底部显示评论区
              value: true

        # ===== 侧边栏设置 =====
        - $formkit: group
          name: sidebar_settings
          label: 侧边栏
          value:
            show_sidebar: false
            enable_custom_sidebar: false
            sidebar_position: right
            sidebar_widgets:
              - widget: author_card
              - widget: blog_stats
              - widget: categories
              - widget: tags
              - widget: popular_posts
          children:
            - $formkit: switch
              id: equipment_show_sidebar
              name: show_sidebar
              label: 显示侧边栏
              help: 启用后显示侧边栏，页面变为左右布局
              value: false
            - $formkit: switch
              id: equipment_enable_custom_sidebar
              name: enable_custom_sidebar
              if: $get(equipment_show_sidebar).value
              label: 定制侧边栏
              help: 启用后可单独配置此页面的侧边栏，禁用则使用全局配置
              value: false
            - $formkit: toggle
              name: sidebar_position
              if: $get(equipment_enable_custom_sidebar).value
              label: 侧边栏位置
              render-type: text
              size: 80
              gap: 10
              value: right
              options:
                - label: 左侧
                  value: left
                - label: 右侧
                  value: right
            - $formkit: array
              name: sidebar_widgets
              if: $get(equipment_enable_custom_sidebar).value
              label: 小工具列表
              addLabel: 添加小工具
              min: 0
              max: 10
              itemLabels:
                - type: text
                  label: $value.widget
              value:
                - widget: author_card
                - widget: blog_stats
                - widget: categories
                - widget: tags
                - widget: popular_posts
              children:
                - $formkit: select
                  name: widget
                  label: 小工具类型
                  options: *widget_options

        # ===== 悬浮控制栏设置 =====
        - $formkit: group
          name: floating_dock
          label: 悬浮控制栏
          value:
            enable_custom_dock: false
            dock_menu: primary
            enable_back_to_top: true
          children:
            - $formkit: switch
              id: equipment_enable_custom_dock
              name: enable_custom_dock
              label: 定制悬浮控制栏
              help: 启用后可单独配置此页面的悬浮控制栏，禁用则使用全局配置
              value: false
            - $formkit: menuRadio
              name: dock_menu
              label: Dock 菜单
              value: primary
              if: $get(equipment_enable_custom_dock).value
            - $formkit: switch
              name: enable_back_to_top
              label: 返回顶部按钮
              if: $get(equipment_enable_custom_dock).value
              value: true
    # ==========================================
    #  悬浮音乐播放器 (APlayer + MetingJS)
    # ==========================================
    - group: music
      label: 音乐播放器
      formSchema:
        - $formkit: group
          name: music_settings
          label: 基础设置
          value:
            enable: false
            enable_pjax: true
            server: netease
            type: playlist
            id: ""
          children:
            - $formkit: switch
              name: enable
              id: music_enable
              label: 启用悬浮音乐播放器
              help: 开启后在所有页面底部显示悬浮音乐播放器
              value: false
            - $formkit: switch
              name: enable_pjax
              id: music_enable_pjax
              label: 启用 PJAX 无刷新切换
              help: 开启后页面切换无刷新（推荐开启，关闭音乐播放器时可选择关闭以减少资源加载）
              value: true
            - $formkit: select
              name: server
              label: 音乐平台
              if: $get(music_enable).value
              value: netease
              options:
                - label: 网易云音乐
                  value: netease
                - label: QQ 音乐
                  value: tencent
                - label: 酷狗
                  value: kugou
                - label: 酷我
                  value: kuwo
                - label: 百度
                  value: baidu
            - $formkit: select
              name: type
              label: 资源类型
              if: $get(music_enable).value
              value: playlist
              options:
                - label: 歌单
                  value: playlist
                - label: 专辑
                  value: album
                - label: 歌手热门
                  value: artist
                - label: 单曲
                  value: song
            - $formkit: text
              name: id
              label: 资源 ID
              if: $get(music_enable).value
              help: "歌单/专辑/歌手/单曲的 ID（从音乐平台 URL 中获取）"
              validation: required
        - $formkit: group
          name: player_config
          label: 播放器配置
          if: $get(music_enable).value
          value:
            volume: 70
            order: list
          children:
            - $formkit: number
              name: volume
              label: 默认音量
              help: "0-100，推荐 50-80"
              value: 70
              min: 0
              max: 100
              step: 5
            - $formkit: select
              name: order
              label: 播放顺序
              value: list
              options:
                - label: 列表循环
                  value: list
                - label: 随机播放
                  value: random
        - $formkit: group
          name: position_config
          label: 位置与显示
          if: $get(music_enable).value
          value:
            default_position: bottom-left
            default_offset_x: 16
            default_offset_y: 24
          children:
            - $formkit: select
              name: default_position
              label: 默认位置
              help: 播放器在屏幕上的初始位置
              value: bottom-left
              options:
                - label: 左上角
                  value: top-left
                - label: 顶部居中
                  value: top-center
                - label: 右上角
                  value: top-right
                - label: 左侧居中
                  value: middle-left
                - label: 正中央
                  value: middle-center
                - label: 右侧居中
                  value: middle-right
                - label: 左下角（默认）
                  value: bottom-left
                - label: 底部居中
                  value: bottom-center
                - label: 右下角
                  value: bottom-right
            - $formkit: number
              name: default_offset_x
              label: 水平微调（px）
              help: "边角位置：距左/右边缘距离（默认 16）；居中位置：向右偏移量（0 = 正中，负值向左）"
              value: 16
              min: -500
              max: 500
              step: 4
            - $formkit: number
              name: default_offset_y
              label: 垂直微调（px）
              help: "边角位置：距上/下边缘距离（默认 24）；居中位置：向下偏移量（0 = 正中，负值向上）"
              value: 24
              min: -500
              max: 500
              step: 4
        - $formkit: group
          name: cdn_config
          label: CDN / 代理设置
          if: $get(music_enable).value
          value:
            aplayer_js: "https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"
            meting_api: "https://api.injahow.cn/meting/?server=:server&type=:type&id=:id&r=:r"
          children:
            - $formkit: text
              name: aplayer_js
              label: APlayer JS 地址
              value: "https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"
            - $formkit: text
              name: meting_api
              label: Meting API 代理地址
              help: "必填。官方 API 已失效，需使用第三方代理。格式：https://api.example.com/meting/?server=:server&type=:type&id=:id&r=:r"
              value: "https://api.injahow.cn/meting/?server=:server&type=:type&id=:id&r=:r"
