              value: false
            - $formkit: toggle
              name: dock_style
              label: Dock 样式
              help: 选择悬浮控制栏的展示样式
              if: $get(docsme_catalog_custom_dock).value
              render-type: text
              size: 80
              gap: 10
              value: bottom
              options:
                - label: 底部居中
                  value: bottom
                - label: 右侧可折叠
                  value: side
            - $formkit: menuRadio
              name: dock_menu
              label: Dock 菜单
              value: primary
              if: $get(docsme_catalog_custom_dock).value
              help: 选择要在悬浮控制栏中显示的菜单
