apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-sky-blog-1-setting
spec:
  forms:
    - group: general
      label: 通用（全局）
      formSchema:
        - $formkit: group
          name: loading_screen
          label: 页面加载屏幕
          value:
            enable_loading: false
            animation_type: css
            css_style: bars
            loading_text: "Loading..."
            min_duration: 300
            custom_svg: ""
            custom_gif: ""
          children:
            - $formkit: switch
              id: enable_loading
              name: enable_loading
              label: 启用加载屏幕
              help: 在页面加载时显示加载动画，避免样式闪烁和变形
              value: true
            - $formkit: toggle
              id: animation_type
              name: animation_type
              if: $get(enable_loading).value
              label: 动画来源
              help: 选择加载动画的来源方式
              render-type: text
              size: 80
              gap: 10
              value: css
              options:
                - label: 内置 CSS 动画
                  value: css
                - label: 自定义 GIF 动图
                  value: gif
            - $formkit: toggle
              name: css_style
              key: css_style_field
              if: $get(animation_type).value === 'css'
              label: CSS 动画样式
              help: 选择内置的 CSS 加载动画样式
              render-type: text
              size: 60
              gap: 10
              value: bars
              options:
                - label: Spinner
                  value: spinner
                - label: Dots
                  value: dots
                - label: Bars
                  value: bars
                - label: Ring
                  value: ring
            - $formkit: attachment
              name: custom_gif
              key: custom_gif_field
              if: $get(animation_type).value === 'gif'
              label: 上传 GIF 动图
              help: 上传加载动画 GIF 图片，建议尺寸不超过 100KB
              accepts:
                - image/gif
            - $formkit: text
              if: $get(enable_loading).value
              name: loading_text
              label: 加载文字
              help: 加载动画下方显示的文字提示
              placeholder: "Loading..."
              value: "Loading..."
            - $formkit: number
              if: $get(enable_loading).value
              name: min_duration
              label: 最小显示时间（毫秒）
              help: 加载屏幕至少显示的时间，避免快速闪现，推荐 300-800 毫秒
              value: 300
              min: 0
              max: 3000
              step: 100
        - $formkit: group
          name: global_background
          label: 全局背景
          value:
            enable_custom: false
            background_style: base-200
          children:
            - $formkit: switch
              id: enable_custom_bg
              name: enable_custom
              label: 启用自定义背景
              help: 开启后可以自定义全局页面背景样式
              value: false
            - $formkit: toggle
              name: background_style
              if: $get(enable_custom_bg).value
              label: 背景样式
              help: 选择全局页面的背景样式
              render-type: text
              value: base-200
              options:
                - label: Base 100 (最浅)
                  value: base-100
                  render: Base 100
                - label: Base 200 (默认)
                  value: base-200
                  render: Base 200
                - label: Base 300 (较深)
                  value: base-300
                  render: Base 300
                - label: 网格背景
                  value: grid
                  render: Grid
        - $formkit: group
          name: floating_dock
          label: 悬浮控制栏
          value:
            enable_dock: true
            dock_style: side
            dock_menu: primary
            enable_back_to_top: true
          children:
            - $formkit: switch
              id: fd_general_enable_dock
              name: enable_dock
              label: 启用悬浮 Dock
              help: 是否显示悬浮控制栏（通用页面）
              value: true
            - $formkit: toggle
              name: dock_style
              label: Dock 样式
              help: 选择悬浮控制栏的展示样式
              if: $get(fd_general_enable_dock).value
              render-type: text
              size: 80
              gap: 10
              value: side
              options:
                - label: 底部居中
                  value: bottom
                - label: 右侧可折叠
                  value: side
            - $formkit: menuRadio
              name: dock_menu
              label: Dock 菜单
              value: primary
              if: $get(fd_general_enable_dock).value
              help: 选择要在悬浮控制栏中显示的菜单。菜单项的图标通过【元数据】中的 icon 字段设置（填入 SVG 代码）
            - $formkit: switch
              name: enable_back_to_top
              label: 返回顶部按钮
              help: 控制悬浮 Dock 中是否显示"返回顶部"按钮
              if: $get(fd_general_enable_dock).value
              value: true
        - $formkit: group
          name: sidebar_settings
          label: 全局侧边栏
          value:
            position: right
            popular_posts_count: 5
            recent_posts_count: 5
          children:
            - $formkit: toggle
              name: position
              label: 侧边栏位置
              help: 选择侧边栏显示在左侧还是右侧（各页面可单独覆盖）
              render-type: text
              size: 80
              gap: 10
              value: right
              options:
                - label: 左侧
                  value: left
                - label: 右侧
                  value: right
            - $formkit: array
              name: widgets
              label: 小工具列表
              help: 拖拽排序、添加或删除侧边栏小工具（各页面可单独覆盖）
              addLabel: 添加小工具
              min: 0
              max: 10
              itemLabels:
                - type: text
                  label: $value.widget
              value:
                - widget: author_card
                - widget: steam_card
                - widget: blog_stats
                - widget: categories
                - widget: tags
                - widget: popular_posts
                - widget: recent_posts
              children:
                - $formkit: select
                  name: widget
                  label: 小工具类型
                  options: &widget_options
                    - label: 欢迎卡片（天气）
                      value: welcome_card
                    - label: 作者卡片
                      value: author_card
                    - label: 博客统计
                      value: blog_stats
                    - label: 文章分类
                      value: categories
                    - label: 标签云
                      value: tags
                    - label: 热门文章
                      value: popular_posts
                    - label: 最新文章
                      value: recent_posts
                    - label: Steam 卡片
                      value: steam_card
                    - label: 追番卡片
                      value: bangumi_card
                    - label: 在线统计
                      value: online_stats
            - $formkit: number
              name: popular_posts_count
              label: 热门文章数量
              help: 热门文章小工具显示的文章数量
              value: 5
              min: 3
              max: 10
            - $formkit: number
              name: recent_posts_count
              label: 最新文章数量
              help: 最新文章小工具显示的文章数量
              value: 5
              min: 3
              max: 10
            - $formkit: group
              name: welcome_card_config
              label: "欢迎天气卡片"
              value:
                fallback_region: "北京"
              children:
                - $formkit: text
                  name: fallback_region
                  label: 默认地区（降级容灾）
                  help: '当访客的IP定位失效（如代理环境或服务宕机）时，天气组件强制获取该城市的默认天气数据防报错。例如: "北京"'
                  value: "北京"
            - $formkit: group
              name: online_stats_config
              label: "在线统计（plugin-online）"
              value:
                show_hot_pages: true
              children:
                - $formkit: switch
                  name: show_hot_pages
                  label: 显示热门页面
                  help: 是否在在线统计组件中显示热门页面排行
                  value: true
        - $formkit: group
          name: font_settings
          label: 全局字体
          value:
            body_font: font-siyuan-songti
            font_cdn: "https://cdn.5ee.net/fonts"
          children:
            - $formkit: toggle
              name: body_font
              label: 正文字体
              help: 选择全站正文的字体风格，影响文章、文档等内容区域
              render-type: text
              size: 80
              gap: 10
              value: font-default
              options:
                - label: 系统默认
                  value: font-default
                - label: 霞鹜文楷亮
                  value: font-lxgw-wenkai-bright
                - label: 思源宋体
                  value: font-siyuan-songti
            - $formkit: text
              name: font_cdn
              label: 字体 CDN 地址
              help: 自定义字体文件的 CDN 根路径，末尾不要加斜杠
              value: "https://cdn.5ee.net/fonts"

        - $formkit: group
          name: debug_settings
          label: 开发者与调试
          value:
            enable_weather_debug: false
          children:
            - $formkit: switch
              name: enable_weather_debug
              label: 开启天气组件 Debug 日志
              help: "排查错误用。开启后会在浏览器 F12 控制台打印包含天气热力学地图、渲染流程、定位状态等关键日志。若需强制刷新天气缓存请执行：localStorage.removeItem('sky_weather_cache_v13')"
              value: false

    - group: nav

      label: 顶部（全局）
      formSchema:
        - $formkit: group
          name: logo_settings
          label: Logo 设置
          value:
            logo_type: none
            logo_icon: null
            logo_icon_html: ""
            logo_image: ""
            show_logo_title: true
            custom_logo_title: "5ee.net"
          children:
            - $formkit: toggle
              id: logo_type
              name: logo_type
              label: Logo 图标类型
              help: 选择 Logo 图标的显示方式
              render-type: text
              size: 60
              gap: 10
              value: iconify
              options:
                - label: 隐藏
                  value: none
                - label: 设置-Logo
                  value: system
                - label: Iconify
                  value: iconify
                - label: SVG
                  value: svg
                - label: 上传图片
                  value: image
            - $formkit: iconify
              name: logo_icon
              key: logo_icon_field
              if: $get(logo_type).value === 'iconify'
              label: Logo 图标
              help: 从图标库中选择 Logo 图标
              format: svg
              value-only: true
            - $formkit: code
              name: logo_icon_html
              key: logo_icon_html_field
              if: $get(logo_type).value === 'svg'
              label: Logo SVG 代码
              help: 直接输入 SVG 或其他 HTML 代码，将在页面中直接渲染
              language: html
              height: 120
              value: ""
            - $formkit: attachment
              name: logo_image
              key: logo_image_field
              if: $get(logo_type).value === 'image'
              label: Logo 图片
              help: 上传 Logo 图片，支持 PNG、JPG、SVG 等格式，建议尺寸 32x32 或 64x64
              accepts:
                - image/*
            - $formkit: switch
              id: show_logo_title
              name: show_logo_title
              label: 显示 Logo 标题
              help: 是否显示 Logo 右侧的标题文字
              value: true
            - $formkit: text
              name: custom_logo_title
              key: custom_logo_title_field
              if: $get(show_logo_title).value === true
              label: 自定义 Logo 标题
              help: 留空则使用站点标题，填写则使用自定义标题
              placeholder: "留空使用站点标题"
        - $formkit: group
          name: menu_settings
          label: 菜单设置
          value:
            primary_menu: primary
          children:
            - $formkit: menuRadio
              name: primary_menu
              label: 导航栏菜单
              value: primary
              help: 选择要在主导航栏显示的菜单
        - $formkit: group
          name: theme_settings
          label: 主题设置
          value:
            show_theme_toggle: true
            default_theme: auto
            light_theme: light
            dark_theme: dark
            light_icon: null
            dark_icon: null
          children:
            - $formkit: switch
              id: nav_show_theme_toggle
              name: show_theme_toggle
              label: 主题前端开关
              help: 前端右上角主题切换按钮的显示控制
              value: true
            - $formkit: iconify
              name: light_icon
              key: light_icon_field
              if: $get(nav_show_theme_toggle).value
              label: 浅色主题图标
              help: 自定义浅色主题按钮图标，不选择则使用默认图标
              format: svg
              value-only: true
            - $formkit: iconify
              name: dark_icon
              key: dark_icon_field
              if: $get(nav_show_theme_toggle).value
              label: 深色主题图标
              help: 自定义深色主题按钮图标，不选择则使用默认图标
              format: svg
              value-only: true
            - $formkit: toggle
              name: default_theme
              label: 默认主题
              help: 当前默认显示的主题,可从以下主题中选择,https://daisyui.com/theme-generator/ 查看具体配色方案
              render-type: text
              size: 80
              gap: 10
              value: auto
              options:
                - label: 浅色主题
                  value: light_theme
                - label: 深色主题
                  value: dark_theme
                - label: 跟随系统
                  value: auto
            - $formkit: toggle
              name: light_theme
              label: 浅色主题
              help: 选择浅色模式下使用的主题
              render-type: image
              size: 40
              gap: 4
              value: light
              options:
                - label: Light
                  value: light
                  render: "/themes/theme-sky-blog-1/assets/previews/light.svg"
                - label: Cupcake
                  value: cupcake
                  render: "/themes/theme-sky-blog-1/assets/previews/cupcake.svg"
                - label: Bumblebee
                  value: bumblebee
                  render: "/themes/theme-sky-blog-1/assets/previews/bumblebee.svg"
                - label: Emerald
                  value: emerald
                  render: "/themes/theme-sky-blog-1/assets/previews/emerald.svg"
                - label: Corporate
                  value: corporate
                  render: "/themes/theme-sky-blog-1/assets/previews/corporate.svg"
                - label: Retro
                  value: retro
                  render: "/themes/theme-sky-blog-1/assets/previews/retro.svg"
                - label: Cyberpunk
                  value: cyberpunk
                  render: "/themes/theme-sky-blog-1/assets/previews/cyberpunk.svg"
                - label: Valentine
                  value: valentine
                  render: "/themes/theme-sky-blog-1/assets/previews/valentine.svg"
                - label: Garden
                  value: garden
                  render: "/themes/theme-sky-blog-1/assets/previews/garden.svg"
                - label: Lofi
                  value: lofi
                  render: "/themes/theme-sky-blog-1/assets/previews/lofi.svg"
                - label: Pastel
                  value: pastel
                  render: "/themes/theme-sky-blog-1/assets/previews/pastel.svg"
                - label: Fantasy
                  value: fantasy
                  render: "/themes/theme-sky-blog-1/assets/previews/fantasy.svg"
                - label: Wireframe
                  value: wireframe
                  render: "/themes/theme-sky-blog-1/assets/previews/wireframe.svg"
                - label: CMYK
                  value: cmyk
                  render: "/themes/theme-sky-blog-1/assets/previews/cmyk.svg"
                - label: Autumn
                  value: autumn
                  render: "/themes/theme-sky-blog-1/assets/previews/autumn.svg"
                - label: Acid
                  value: acid
                  render: "/themes/theme-sky-blog-1/assets/previews/acid.svg"
                - label: Lemonade
                  value: lemonade
                  render: "/themes/theme-sky-blog-1/assets/previews/lemonade.svg"
                - label: Winter
                  value: winter
                  render: "/themes/theme-sky-blog-1/assets/previews/winter.svg"
                - label: Nord
                  value: nord
                  render: "/themes/theme-sky-blog-1/assets/previews/nord.svg"
                - label: Caramellatte
                  value: caramellatte
                  render: "/themes/theme-sky-blog-1/assets/previews/caramellatte.svg"
                - label: Silk
                  value: silk
                  render: "/themes/theme-sky-blog-1/assets/previews/silk.svg"
            - $formkit: toggle
              name: dark_theme
              label: 深色主题
              help: 选择深色模式下使用的主题
              render-type: image
              size: 40
              gap: 4
              value: dark
              options:
                - label: Dark
                  value: dark
                  render: "/themes/theme-sky-blog-1/assets/previews/dark.svg"
                - label: Synthwave
                  value: synthwave
                  render: "/themes/theme-sky-blog-1/assets/previews/synthwave.svg"
                - label: Halloween
                  value: halloween
                  render: "/themes/theme-sky-blog-1/assets/previews/halloween.svg"
                - label: Forest
                  value: forest
                  render: "/themes/theme-sky-blog-1/assets/previews/forest.svg"
                - label: Aqua
                  value: aqua
                  render: "/themes/theme-sky-blog-1/assets/previews/aqua.svg"
                - label: Black
                  value: black
                  render: "/themes/theme-sky-blog-1/assets/previews/black.svg"
                - label: Luxury
                  value: luxury
                  render: "/themes/theme-sky-blog-1/assets/previews/luxury.svg"
                - label: Dracula
                  value: dracula
                  render: "/themes/theme-sky-blog-1/assets/previews/dracula.svg"
                - label: Business
                  value: business
                  render: "/themes/theme-sky-blog-1/assets/previews/business.svg"
                - label: Night
                  value: night
                  render: "/themes/theme-sky-blog-1/assets/previews/night.svg"
                - label: Coffee
                  value: coffee
                  render: "/themes/theme-sky-blog-1/assets/previews/coffee.svg"
                - label: Dim
                  value: dim
                  render: "/themes/theme-sky-blog-1/assets/previews/dim.svg"
                - label: Sunset
                  value: sunset
                  render: "/themes/theme-sky-blog-1/assets/previews/sunset.svg"
                - label: Abyss
                  value: abyss
                  render: "/themes/theme-sky-blog-1/assets/previews/abyss.svg"
        - $formkit: group
          name: right_settings
          label: 功能设置
          value:
            show_search: true
            search_icon: null
            show_user_actions: true
            login_icon: null
          children:
            - $formkit: switch
              id: nav_show_search
              name: show_search
              label: 搜索按钮
              help: 右上角搜索按钮
              value: true
            - $formkit: iconify
              name: search_icon
              key: search_icon_field
              if: $get(nav_show_search).value
              label: 搜索按钮图标
              help: 自定义搜索按钮图标，不选择则使用默认图标
              format: svg
              value-only: true
            - $formkit: switch
              id: nav_show_user_actions
              name: show_user_actions
              label: 登录按钮
              help: 右上角登录/用户菜单按钮
              value: true
            - $formkit: iconify
              name: login_icon
              key: login_icon_field
              if: $get(nav_show_user_actions).value
              label: 登录按钮图标
              help: 自定义登录按钮图标，不选择则使用默认图标
              format: svg
              value-only: true

    - group: footer
      label: 页脚（全局）
      formSchema:
        - $formkit: group
          name: brand_settings
          label: 站点信息设置
          value:
            brand_icon_type: iconify
            brand_icon: null
            brand_icon_html: ""
            brand_icon_image: ""
            show_brand_title: true
            custom_brand_title: ""
            show_brand_subtitle: true
            brand_subtitle: "现代博客主题"
            show_site_days: true
            site_start_date: "2024-01-01"
          children:
            - $formkit: toggle
              id: brand_icon_type
              name: brand_icon_type
              label: 站点图标类型
              help: 选择站点图标的显示方式
              render-type: text
              size: 60
              gap: 10
              value: iconify
              options:
                - label: 隐藏
                  value: none
                - label: Iconify
                  value: iconify
                - label: SVG
                  value: svg
                - label: 上传图片
                  value: image
            - $formkit: iconify
              name: brand_icon
              key: brand_icon_field
              if: $get(brand_icon_type).value === 'iconify'
              label: 站点图标
              help: 从图标库中选择站点图标
              format: svg
              value-only: true
            - $formkit: code
              name: brand_icon_html
              key: brand_icon_html_field
              if: $get(brand_icon_type).value === 'svg'
              label: 站点图标 SVG 代码
              help: 直接输入 SVG 或其他 HTML 代码，将在页面中直接渲染
              language: html
              height: 120
              value: ""
            - $formkit: attachment
              name: brand_icon_image
              key: brand_icon_image_field
              if: $get(brand_icon_type).value === 'image'
              label: 站点图标图片
              help: 上传站点图标图片，支持 PNG、JPG、SVG 等格式，建议尺寸 32x32 或 64x64
              accepts:
                - image/*
            - $formkit: switch
              id: show_brand_title
              name: show_brand_title
              label: 显示站点标题
              help: 是否显示页脚站点标题
              value: true
            - $formkit: text
              name: custom_brand_title
              id: custom_brand_title_field
              key: custom_brand_title_field
              if: $get(show_brand_title).value
              label: 自定义站点标题
              help: 留空则使用站点标题，填写则使用自定义标题
            - $formkit: switch
              id: show_brand_subtitle
              name: show_brand_subtitle
              label: 显示站点副标题
              help: 是否显示页脚站点副标题
              value: true
            - $formkit: text
              name: brand_subtitle
              id: brand_subtitle_field
              key: brand_subtitle_field
              if: $get(show_brand_subtitle).value
              label: 站点副标题
              help: 站点标题下方的描述文字
            - $formkit: switch
              id: show_site_days
              name: show_site_days
              label: 显示运行天数
              help: 是否显示网站运行天数统计
              value: true
            - $formkit: date
              name: site_start_date
              id: site_start_date_field
              key: site_start_date_field
              if: $get(show_site_days).value
              label: 建站日期
              help: 网站建立日期，格式：YYYY-MM-DD
        - $formkit: group
          name: navigation_settings
          label: 底部导航设置
          value:
            show_quick_nav: true
            nav_title: "底部导航"
            nav_menu: ""
          children:
            - $formkit: switch
              id: show_quick_nav
              name: show_quick_nav
