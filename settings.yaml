    - group: index
      label: 首页
      formSchema:
        # 自由排版与布局控制
        - $formkit: group
          name: index_layout
          label: 自由排序控制器
          value:
            enabled: false
            modules:
              - id: heatmap
              - id: docs
              - id: tabs_group
              - id: gallery
              - id: links
          children:
            - $formkit: switch
              id: index_enable_custom_layout
              name: enabled
              label: 开启模块自由排序
              help: 关闭则默认按原固化顺序铺设。开启后可通过下方列表自由拖拽顺序（需保证底层各模块单独开关已开启）。
            - $formkit: array
              name: modules
              label: 首页模块流
              if: $get(index_enable_custom_layout).value
              addLabel: 插入模块
              itemLabels:
                - type: text
                  label: $value.id
              children:
                - $formkit: select
                  name: id
                  label: 选择功能模块
                  options:
                    - label: 热力图 (Heatmap)
                      value: heatmap
                    - label: 文档中心 (Docs)
                      value: docs
                    - label: 内容聚合区 (文章/瞬间/动态 Tab)
                      value: tabs_group
                    - label: 图库区 (Gallery)
                      value: gallery
                    - label: 友情链接区 (Links)
                      value: links

        # 头部背景设置（包含总开关）
        - $formkit: group
          name: background_settings
          label: 头部背景设置
          value:
            enable_header: true
            background_type: effect
            background_image: "https://www.dmoe.cc/random.php"
            effect_style: starry-sky
            light_scheme: black
            light_custom_color: "#000000"
            dark_scheme: black
            dark_custom_color: "#000000"
          children:
            - $formkit: switch
              id: index_enable_header
              name: enable_header
              label: 启用首页头部
              help: 总开关，控制：头部背景、主标题、副标题、底部过渡、瞬间说说
              value: true
            - $formkit: toggle
              id: background_type
              name: background_type
              if: $get(index_enable_header).value
              label: 背景类型
              help: 选择首页头部背景的显示方式。注：天气联动需在侧边栏启用「天气小组件」
              render-type: text
              size: 80
              gap: 10
              value: effect
              options:
                - label: 无
                  value: none
                - label: 背景图片
                  value: image
                - label: CSS 特效
                  value: effect
                - label: 天气联动
                  value: weather
            - $formkit: attachment
              name: background_image
              key: background_image_field
              if: $get(index_enable_header).value && $get(background_type).value === 'image'
              label: 背景媒体（上传或输入地址）
              help: 上传图片/视频或直接输入 URL；附件控件兼容外链路径 https://www.dmoe.cc/random.php
              accepts:
                - image/jpeg
                - image/png
                - image/webp
                - image/gif
                - video/mp4
                - video/webm
                - video/ogg
            - $formkit: toggle
              name: effect_style
              key: effect_style_field
              if: $get(index_enable_header).value && $get(background_type).value === 'effect'
              label: 特效样式
              help: 选择 CSS 特效的视觉风格，支持自动适配主题色
              render-type: text
              size: 60
              gap: 10
              value: starry-sky
              options:
                - label: 流体渐变
                  value: fluid-gradient
                - label: 霓虹线条
                  value: neon-lines
                - label: 深邃星空
                  value: starry-sky
            # 蒙版渐变设置 - 扁平化到 background_settings 中
            - $formkit: toggle
              id: light_scheme
              name: light_scheme
              if: $get(index_enable_header).value && $get(background_type).value === 'image'
              label: 浅色主题蒙版
              help: 选择浅色主题下的蒙版颜色方案
              render-type: color
              size: 40
              gap: 8
              value: black
              options:
                - label: 黑色
                  value: black
                  render: "#1a1a1a"
                - label: 白色
                  value: white
                  render: "#ffffff"
                - label: 主题背景色
                  value: theme
                  render: "#e5e7eb"
                - label: 自定义
                  value: custom
                  render: "#6366f1"
            - $formkit: color
              name: light_custom_color
              if: $get(index_enable_header).value && $get(background_type).value === 'image' && $get(light_scheme).value === 'custom'
              label: 自定义颜色（浅色主题）
              help: 选择浅色主题下蒙版的自定义颜色
              value: "#000000"
            - $formkit: toggle
              id: dark_scheme
              name: dark_scheme
              if: $get(index_enable_header).value && $get(background_type).value === 'image'
              label: 深色主题蒙版
              help: 选择深色主题下的蒙版颜色方案
              render-type: color
              size: 40
              gap: 8
              value: black
              options:
                - label: 黑色
                  value: black
                  render: "#1a1a1a"
                - label: 白色
                  value: white
                  render: "#ffffff"
                - label: 主题背景色
                  value: theme
                  render: "#374151"
                - label: 自定义
                  value: custom
                  render: "#6366f1"
            - $formkit: color
              name: dark_custom_color
              if: $get(index_enable_header).value && $get(background_type).value === 'image' && $get(dark_scheme).value === 'custom'
              label: 自定义颜色（深色主题）
              help: 选择深色主题下蒙版的自定义颜色
              value: "#000000"
        - $formkit: group
          name: title_settings
          label: 主标题设置
          if: $get(index_enable_header).value
          value:
            show_title: true
            custom_title: "sky blog"
            decoration_effect: effect-particles
            title_font: font-titan-one
            style_effect: effect-marker-pop
            effect_color: "var(--color-primary)"
          children:
            - $formkit: switch
              id: show_title
              name: show_title
              label: 显示主标题
              help: 是否显示首页头部的主标题
              value: true
            - $formkit: text
              name: custom_title
              key: custom_title_field
              if: $get(show_title).value
              label: 自定义主标题
              help: 留空则使用站点标题，填写则使用自定义标题
            - $formkit: toggle
              id: title_font
              name: title_font
              if: $get(show_title).value
              label: 字体
              help: 选择主标题的字体
              render-type: text
              size: 60
              gap: 10
              value: font-titan-one
              options:
                - label: 无
                  value: font-default
                - label: Monoton
                  value: font-monoton
                - label: Titan One
                  value: font-titan-one
                - label: 霞鹜文楷亮
                  value: font-lxgw-wenkai-bright
                - label: 思源宋
                  value: font-siyuan-songti
            - $formkit: select
              name: style_effect
              key: style_effect_field
              if: $get(show_title).value
              label: 样式效果
              help: |
                选择标题的视觉样式
                - 🎨可自定义颜色：其他效果可在下方设置特效主色
              value: effect-marker-pop
              options:
                - value: none
                  label: 无
                - value: effect-marker-pop
                  label: 🎨 麦克笔感（推荐Titan One）
                - value: effect-diagonal-split
                  label: 🎨 斜切双色（推荐Monoton）
                - value: gradient-flow
                  label: 流光渐变
                - value: stroke-glow
                  label: 🎨 描边发光
                - value: text-glow
                  label: 🎨 微光晕染
                - value: simple-shadow
                  label: 🎨 简约阴影
            - $formkit: text
              name: effect_color
              key: effect_color_field
              if: $get(show_title).value && $get(style_effect).value !== 'effect-marker-pop' && $get(style_effect).value !== 'effect-diagonal-split' && $get(style_effect).value !== 'none'
              label: 特效主色
              help: |
                设置发光、描边、渐变等特效的颜色（文字本身保持白色）
                支持格式：
                - 颜色值：#3b82f6、#8b5cf6
                - CSS变量：var(--color-primary)、var(--color-secondary)
              placeholder: "var(--color-primary)"
              value: "var(--color-primary)"
            - $formkit: toggle
              id: decoration_effect
              name: decoration_effect
              if: $get(show_title).value
              label: 装饰效果（可选）
              help: 为标题添加动态装饰元素
              render-type: text
              size: 80
              gap: 10
              value: none
              options:
                - label: 无
                  value: none
                - label: 粒子轨道
                  value: effect-particles
                - label: 星光闪烁
                  value: effect-starlight
        - $formkit: group
          name: subtitle_settings
          label: 副标题设置
          if: $get(index_enable_header).value
          value:
            show_subtitle: true
            subtitle_text: "记录生活，分享思考，探索无限可能"
            subtitle_font: font-default
            subtitle_effect: typewriter
            subtitle_color: ""
          children:
            - $formkit: switch
              id: show_subtitle
              name: show_subtitle
              label: 显示副标题
              help: 是否显示首页头部的副标题
              value: true
            - $formkit: text
              name: subtitle_text
              key: subtitle_text_field
              if: $get(show_subtitle).value
              label: 副标题文本
              help: 首页头部副标题的文字内容
            - $formkit: toggle
              id: subtitle_font
              name: subtitle_font
              if: $get(show_subtitle).value
              label: 字体
              help: 选择副标题的字体
              render-type: text
              size: 60
              gap: 10
              value: font-default
              options:
                - label: 默认字体
                  value: font-default
                - label: Monoton
                  value: font-monoton
                - label: Titan One
                  value: font-titan-one
                - label: 霞鹜文楷亮
                  value: font-lxgw-wenkai-bright
                - label: 思源宋
                  value: font-siyuan-songti
            - $formkit: select
              name: subtitle_effect
              key: subtitle_effect_field
              if: $get(show_subtitle).value
              label: 样式效果
              help: |
                选择副标题的视觉样式
                - 固定颜色：渐变流动
                - 🎨可自定义颜色：打字机、微发光、呼吸
              value: typewriter
              options:
                - value: none
                  label: 无
                - value: typewriter
                  label: 🎨 打字机
                - value: gradient-flow
                  label: 渐变流动
                - value: subtle-glow
                  label: 🎨 微发光
                - value: fade-pulse
                  label: 🎨 呼吸
            - $formkit: text
              name: subtitle_color
              key: subtitle_color_field
              if: $get(show_subtitle).value && $get(subtitle_effect).value !== 'typewriter' && $get(subtitle_effect).value !== 'gradient-flow' && $get(subtitle_effect).value !== 'none'
              label: 特效主色
              help: |
                设置光晕、渐变等特效的颜色
                支持格式：
                - 颜色值：#3b82f6、#8b5cf6
                - CSS变量：var(--color-primary)、var(--color-secondary)
              placeholder: "var(--color-primary)"
              value: "var(--color-primary)"
        - $formkit: group
          name: wave_transition_settings
          label: 底部过渡设置
          if: $get(index_enable_header).value
          value:
            show_wave_transition: true
            wave_color: "var(--sky-container)"
          children:
            - $formkit: switch
              id: show_wave_transition
              name: show_wave_transition
              label: 显示波浪过渡
              help: 是否显示首页头部底部的波浪过渡效果
              value: true
            - $formkit: text
              name: wave_color
              key: wave_color_field
              if: $get(show_wave_transition).value
              label: 波浪颜色
              help: 波浪的颜色，可以使用颜色名称、HEX、RGB、变量
        - $formkit: group
          name: moment_settings
          label: 瞬间说说设置
          if: $get(index_enable_header).value
          value:
            show_moment: true
            moment_title: "瞬间"
          children:
            - $formkit: switch
              id: show_moment
              name: show_moment
              label: 显示瞬间说说
              help: 是否在首页显示瞬间说说模块
              value: true
            - $formkit: text
              name: moment_title
              key: moment_title_field
              if: $get(show_moment).value
              label: 瞬间标题
              help: 瞬间说说模块的标题文字
              value: "瞬间"
        # 侧边栏设置
        - $formkit: group
          name: sidebar_settings
          label: 侧边栏设置
          value:
            show_sidebar: true
            enable_custom_sidebar: false
            sidebar_position: right
            sidebar_widgets:
              - widget: welcome_card
              - widget: author_card
              - widget: steam_card
              - widget: blog_stats
              - widget: recent_posts
          children:
            - $formkit: switch
              id: index_show_sidebar
              name: show_sidebar
              label: 显示侧边栏
              help: 是否在首页显示侧边栏
              value: true
            - $formkit: switch
              id: index_enable_custom_sidebar
              name: enable_custom_sidebar
              if: $get(index_show_sidebar).value
              label: 定制侧边栏
              help: 启用后可单独配置此页面的侧边栏，禁用则使用全局配置
              value: false
            - $formkit: toggle
              name: sidebar_position
              if: $get(index_show_sidebar).value && $get(index_enable_custom_sidebar).value
              label: 侧边栏位置
              render-type: text
              size: 80
              gap: 10
              value: right
              options:
                - label: 左侧
                  value: left
                - label: 右侧
                  value: right
            - $formkit: array
              name: sidebar_widgets
              if: $get(index_show_sidebar).value && $get(index_enable_custom_sidebar).value
              label: 小工具列表
              addLabel: 添加小工具
              min: 0
              max: 10
              itemLabels:
                - type: text
                  label: $value.widget
              value:
                - widget: welcome_card
                - widget: author_card
                - widget: steam_card
                - widget: blog_stats
                - widget: recent_posts
              children:
                - $formkit: select
                  name: widget
                  label: 小工具类型
                  options: *widget_options
        # 内容设置
        - $formkit: group
          name: content_settings
          label: 首页内容设置
          value:
            show_heatmap: true
            heatmap_type: github
            tab_style: chips
          children:
            - $formkit: switch
              id: index_show_heatmap
              name: show_heatmap
              label: 显示热力图
              help: 是否在首页显示热力图
              value: true
            - $formkit: toggle
              name: heatmap_type
              if: $get(index_show_heatmap).value
              label: 热力图类型
              help: GitHub 热力图需在"关于"设置中配置用户名
              render-type: text
              size: 80
              gap: 10
              value: github
              options:
                - label: GitHub 贡献
                  value: github
                - label: 文章发布
                  value: article
            - $formkit: toggle
              name: tab_style
              label: Tab 切换风格
              help: 选择首页"站内动态/朋友动态"切换按钮的风格
              render-type: text
              size: 60
              gap: 10
              value: chips
              options:
                - label: 药丸
                  value: pills
                - label: 芯片
                  value: chips
                - label: 下划线
                  value: underline
                - label: 玻璃拟态
                  value: glass
            - $formkit: array
              name: tabs_order
              label: Tab 显示顺序
              help: 使用上下箭头调整首页 Tab 的显示顺序（从左到右）
              value:
                - tab: posts
                - tab: friends
                - tab: moments
              upControl: true
              downControl: true
              insertControl: false
              removeControl: false
              addButton: false
              children:
                - $formkit: select
                  name: tab
                  label: ""
                  options:
                    - label: 全部文章
                      value: posts
                    - label: 朋友动态
                      value: friends
                    - label: 瞬间说说
                      value: moments
        # 文章列表设置
        - $formkit: group
          name: post_settings
          label: 文章列表设置
          value:
            show_posts: true
            list_style: magazine
            post_count: 8
            cover_fallback_enable: true
            cover_fallback_mode: missing_only
            cover_fallback_url: "https://www.dmoe.cc/random.php"
          children:
            - $formkit: switch
              id: show_posts_tab
              name: show_posts
              label: 显示文章列表
              help: 是否显示"全部文章"Tab
              value: true
            - $formkit: toggle
              name: list_style
              if: $get(show_posts_tab).value
              label: 文章列表风格
              help: 选择首页文章列表的展示风格
              render-type: text
              size: 60
              gap: 10
              value: magazine
              options:
                - label: 卡片
                  value: modern
                - label: 列表
                  value: media_text
                - label: 杂志
                  value: magazine
                - label: 极简
                  value: minimal
            - $formkit: number
              name: post_count
              if: $get(show_posts_tab).value
              label: 文章数量
              help: 首页显示的文章数量（3-12）
              value: 8
              min: 3
              max: 12
            - $formkit: switch
              id: index_cover_fallback_enable
              name: cover_fallback_enable
              if: $get(show_posts_tab).value
              label: 启用封面替代
              help: 启用后无封面的文章将使用指定图片替代
              value: true
            - $formkit: toggle
              name: cover_fallback_mode
              if: $get(show_posts_tab).value && $get(index_cover_fallback_enable).value
              label: 替代模式
              help: 选择替代策略
              render-type: text
              size: 80
              gap: 10
              value: missing_only
              options:
                - label: 无封面时替代
                  value: missing_only
                - label: 始终使用
                  value: always
            - $formkit: attachment
              name: cover_fallback_url
              if: $get(show_posts_tab).value && $get(index_cover_fallback_enable).value
              label: 默认封面图片
              help: 上传或选择作为替代封面的图片（支持 jpeg/png/webp/gif）
              accepts:
                - image/jpeg
                - image/png
                - image/webp
                - image/gif
              value: ""
        # 朋友动态设置
        - $formkit: group
          name: friends_settings
          label: 朋友动态设置
          help: 需安装 plugin-friends 插件
          value:
            show_friends_tab: true
            friends_count: 10
          children:
            - $formkit: switch
              id: show_friends_tab
              name: show_friends_tab
              label: 显示朋友动态
              help: 是否显示"朋友动态"Tab
              value: true
            - $formkit: number
              name: friends_count
              if: $get(show_friends_tab).value
              label: 朋友动态数量
              help: 首页显示的朋友动态数量（3-20）
              value: 10
              min: 3
              max: 20
            - $formkit: toggle
              name: list_style
              if: $get(show_friends_tab).value
              label: 列表样式
              help: 选择首页朋友动态的展示样式
              render-type: text
              size: 80
              gap: 10
              value: two_columns
              options:
                - label: 两列
                  value: two_columns
                - label: 单列
                  value: single_column
        # 瞬间说说设置
        - $formkit: group
          name: moments_settings
          label: 瞬间说说设置
          help: 需安装 plugin-moments 插件
          value:
            show_moments_tab: true
            moments_count: 6
            list_style: two_columns
          children:
            - $formkit: switch
              id: show_moments_tab
              name: show_moments_tab
              label: 显示瞬间说说
              help: 是否显示"瞬间说说"Tab
              value: true
            - $formkit: number
              name: moments_count
              if: $get(show_moments_tab).value
              label: 瞬间数量
              help: 首页显示的瞬间数量（3-12）
              value: 6
              min: 3
              max: 12
            - $formkit: toggle
              name: list_style
              if: $get(show_moments_tab).value
              label: 列表样式
              help: 选择首页瞬间的展示样式
              render-type: text
              size: 80
              gap: 10
              value: two_columns
              options:
                - label: 两列
                  value: two_columns
                - label: 单列
                  value: single_column
        # 图库模块设置
        - $formkit: group
          name: gallery_settings
          label: 图库模块
          help: 需安装图库插件 (plugin-photos)
          value:
            enable_gallery: true
            gallery_title: "图库"
            gallery_subtitle: "Focus Moments"
          children:
            - $formkit: switch
              id: enable_gallery
              name: enable_gallery
              label: 启用图库模块
              help: 是否在首页显示图库模块
              value: true
            - $formkit: text
              name: gallery_title
              if: $get(enable_gallery).value
              label: 模块标题
              help: 图库模块的标题文字
              value: "图库"
            - $formkit: text
              name: gallery_subtitle
              if: $get(enable_gallery).value
              label: 模块副标题
              help: 图库模块的副标题文字
              value: "Focus Moments"
        # 友情链接模块设置
        - $formkit: group
          name: links_settings
          label: 友情链接模块
          help: 需安装友链插件 (plugin-links)
          value:
            enable_links: true
            links_title: "友情链接"
            links_subtitle: "Friends & Partners"
            links_groups: []
            links_count: 0
          children:
            - $formkit: switch
              id: enable_links
              name: enable_links
              label: 启用友情链接
              help: 是否在首页显示友情链接模块
              value: true
            - $formkit: text
              name: links_title
              if: $get(enable_links).value
              label: 模块标题
              help: 友情链接模块的标题文字
              value: "友情链接"
            - $formkit: text
              name: links_subtitle
              if: $get(enable_links).value
              label: 模块副标题
              help: 友情链接模块的副标题文字
              value: "Friends & Partners"
            - $formkit: select
              name: links_groups
              if: $get(enable_links).value
              label: 显示分组
              help: 选择要在首页显示的友链分组，留空则显示所有分组
              multiple: true
              clearable: true
              searchable: true
              action: /apis/core.halo.run/v1alpha1/linkgroups
              requestOption:
                method: GET
                pageField: page
                sizeField: size
                totalField: total
                itemsField: items
                labelField: spec.displayName
                valueField: metadata.name
            - $formkit: number
              name: links_count
              if: $get(enable_links).value
              label: 显示数量
              help: 首页最多展示的友链数量（仅前端截断，不限制后端加载，插件问题，暂不支持数量限制），0 为不限制
              value: 0
              validation: min:0
        # 文档中心模块设置
        - $formkit: group
          name: docs_settings
          label: 文档中心模块
          help: 需安装 Docsme 文档插件 (plugin-docsme) ≥1.4.0
          value:
            enable_docs: true
            docs_title: "文档中心"
            docs_subtitle: "Documentation"
            docs_count: 6
          children:
            - $formkit: switch
              id: enable_docs
              name: enable_docs
              label: 启用文档中心
              help: 是否在首页显示文档中心模块
              value: true
            - $formkit: text
              name: docs_title
              if: $get(enable_docs).value
              label: 模块标题
              help: 文档中心模块的标题文字
              value: "文档中心"
            - $formkit: text
              name: docs_subtitle
              if: $get(enable_docs).value
              label: 模块副标题
              help: 文档中心模块的副标题文字
              value: "Documentation"
            - $formkit: number
              name: docs_count
              if: $get(enable_docs).value
              label: 显示数量
              help: 首页最多展示的文档项目数量，默认 6
              value: 6
              validation: min:1
        - $formkit: group
          name: floating_dock
          label: 悬浮控制栏
          value:
            enable_custom_dock: false
            dock_menu: primary
            enable_back_to_top: true
          children:
            - $formkit: switch
              id: index_enable_custom_dock
              name: enable_custom_dock
              label: 定制悬浮控制栏
              help: 启用后可单独配置此页面的悬浮控制栏，禁用则使用全局配置
              value: false
            - $formkit: menuRadio
              name: dock_menu
              label: Dock 菜单
              value: primary
              if: $get(index_enable_custom_dock).value
              help: 选择要在悬浮控制栏中显示的菜单
            - $formkit: switch
              name: enable_back_to_top
              label: 返回顶部按钮
              if: $get(index_enable_custom_dock).value
              value: true
    - group: article
      label: 文章
      formSchema:
        - $formkit: group
          name: header_background
          label: 文章头部背景设置
          value:
            background_type: cover
            enable_fallback: true
            custom_image: ""
            fallback_image: "https://www.dmoe.cc/random.php"
          children:
            - $formkit: toggle
              id: background_type
              name: background_type
              label: 背景图片来源
              help: 选择文章头部背景图片的来源方式
              render-type: text
              size: 80
              gap: 10
              value: cover
              options:
                - label: 文章封面图
                  value: cover
                - label: 自定义图片
                  value: custom
            - $formkit: attachment
              name: custom_image
              key: custom_image_field
              if: $get(background_type).value === 'custom'
              label: 自定义背景图片
              help: 上传图片或输入图片 URL 地址
            - $formkit: switch
              id: enable_fallback
              name: enable_fallback
              label: 启用回退图片
              help: 当选择的图片来源为空时，自动使用回退图片
              value: true
            - $formkit: attachment
              name: fallback_image
              key: fallback_image_field
              if: $get(enable_fallback).value
              label: 回退图片
              help: 当背景图片为空时显示的默认图片，支持随机图片 API
              value: "https://www.dmoe.cc/random.php"
        - $formkit: group
          name: content_settings
          label: 内容显示设置
          value:
            show_excerpt: true
          children:
            - $formkit: switch
              name: show_excerpt
              label: 显示文章摘要
              help: 在文章内容前显示摘要（打字机效果）。如果安装了 AI 摘要插件，建议关闭避免重复
              value: true
        - $formkit: group
          name: sidebar_settings
          label: 侧边栏设置
          value:
            show_sidebar: true
            enable_custom_sidebar: true
            sidebar_position: right
            sidebar_widgets:
              - widget: toc
              - widget: welcome_card
              - widget: author_card
              - widget: blog_stats
              - widget: tags
              - widget: popular_posts
          children:
            - $formkit: switch
              id: post_show_sidebar
              name: show_sidebar
              label: 显示侧边栏
              help: 控制文章页是否显示侧边栏（包含目录、分类、标签等小部件）
              value: true
            - $formkit: switch
              id: post_enable_custom_sidebar
              name: enable_custom_sidebar
              if: $get(post_show_sidebar).value
              label: 定制侧边栏
              help: 启用后可单独配置此页面的侧边栏，禁用则使用全局配置
              value: true
            - $formkit: toggle
              name: sidebar_position
              if: $get(post_enable_custom_sidebar).value
              label: 侧边栏位置
              render-type: text
              size: 80
              gap: 10
              value: right
              options:
                - label: 左侧
                  value: left
                - label: 右侧
                  value: right
            - $formkit: array
              name: sidebar_widgets
              if: $get(post_enable_custom_sidebar).value
              label: 小工具列表
              addLabel: 添加小工具
              min: 0
              max: 10
              itemLabels:
                - type: text
                  label: $value.widget
              value:
                - widget: toc
                - widget: author_card
                - widget: blog_stats
                - widget: categories
                - widget: tags
                - widget: popular_posts
              children:
                - $formkit: select
                  name: widget
                  label: 小工具类型
                  options:
                    - label: 文章目录
                      value: toc
                    - label: 欢迎卡片（天气）
                      value: welcome_card
                    - label: 作者卡片
                      value: author_card
                    - label: 博客统计
                      value: blog_stats
                    - label: 文章分类
                      value: categories
                    - label: 标签云
                      value: tags
                    - label: 热门文章
                      value: popular_posts
                    - label: 最新文章
                      value: recent_posts
                    - label: Steam 卡片
                      value: steam_card
                    - label: 追番卡片
                      value: bangumi_card
                    - label: 在线统计
                      value: online_stats
        - $formkit: group
          name: post_interaction
          label: 文章底部交互
          value:
            enable_like: true
            enable_share: true
            enable_comment: true
          children:
            - $formkit: switch
              name: enable_like
              label: 启用点赞
              help: 文章底部的点赞按钮
              value: true
            - $formkit: switch
              id: post_enable_share
              name: enable_share
              label: 启用分享
              help: 文章底部的分享按钮（打开分享弹窗）
              value: true
            - $formkit: group
              name: share_settings
              label: 分享设置
              if: $get(post_enable_share).value
              value:
                share_item_ids:
                  - wechat
                  - weibo
                  - x
                  - qq
              children:
                - $formkit: select
                  name: share_item_ids
                  multiple: true
                  sortable: true
                  label: 启用的分享平台
                  help: 选择要启用的分享平台，可拖拽调整顺序
                  value:
                    - wechat
                    - weibo
                    - x
                    - qq
                  options:
                    - label: 微信
                      value: wechat
                    - label: X (Twitter)
                      value: x
                    - label: Telegram
                      value: telegram
                    - label: Facebook
                      value: facebook
                    - label: QQ
                      value: qq
                    - label: QQ 空间
                      value: qzone
                    - label: 微博
                      value: weibo
                    - label: 豆瓣
                      value: douban
                    - label: 系统分享
                      value: native
            - $formkit: switch
              name: enable_comment
              label: 启用评论
              help: 文章底部的评论按钮（展开内联评论区）
              value: true
        - $formkit: group
          name: dock_settings
          label: 悬浮控制栏
          value:
            enable_custom_dock: false
            dock_style: global
            post_dock_menu: primary
            enable_toc_drawer: true
            enable_back_to_top: true
          children:
            - $formkit: switch
              id: enable_custom_dock
              name: enable_custom_dock
              label: 启用定制 Dock
              help: 启用后可自定义 Dock 样式和菜单，禁用则使用全局设置
              value: false
            - $formkit: toggle
              name: dock_style
              label: Dock 样式
              help: 选择悬浮控制栏的展示样式
              if: $get(enable_custom_dock).value
              render-type: text
              size: 80
              gap: 10
              value: global
              options:
                - label: 跟随全局
                  value: global
                - label: 底部居中
                  value: bottom
                - label: 右侧可折叠
                  value: side
            - $formkit: menuRadio
              name: post_dock_menu
              label: 文章页 Dock 菜单
              value: primary
              if: $get(enable_custom_dock).value
              help: 选择要在文章页 Dock 中显示的菜单（可以和通用 Dock 菜单一样，也可以选择不同的菜单）
            - $formkit: switch
              id: enable_toc_drawer
              name: enable_toc_drawer
              label: 启用目录抽屉
              help: 移动端或隐藏侧边栏时，从 Dock 打开文章目录（默认开启）
              value: true
            - $formkit: switch
              name: enable_back_to_top
              label: 返回顶部按钮
              help: 控制文章页悬浮 Dock 中是否显示“返回顶部”按钮
              value: true
    - group: category_settings
      label: 分类
      formSchema:
        # ===== 基础信息 =====
        - $formkit: group
          name: basic_info
          label: 基础信息
          value:
            list_style: modern
            category_display_style: style_1
          children:
            - $formkit: toggle
              name: list_style
              label: 文章列表风格
              help: |
                选择分类页的文章列表展示风格。
                • 分类页可通过「分类管理 → 自定义模板」单独覆盖
              render-type: text
              size: 60
              gap: 10
              value: modern
